---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Distribution specific tasks + ES-DE setup"
  when: distribution_config.stat.exists
  block:

    - name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
      ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"

    - name: "EmulationStation Desktop Edition | {{ ansible_facts['distribution'] }} | Ensure the custom folders directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/ES-DE/custom_systems"
        state: directory
        mode: "0755"

    - name: "ES-DE | Symlink es_find_rules.xml (overwrites existing file)"
      ansible.builtin.file:
        src: "{{ _files_path }}/es_find_rules.xml"
        dest: "{{ ansible_facts['user_dir'] }}/ES-DE/custom_systems/es_find_rules.xml"
        state: link
        force: yes

    - name: "ES-DE | Symlink es_systems.xml (overwrites existing file)"
      ansible.builtin.file:
        src: "{{ _files_path }}/es_systems.xml"
        dest: "{{ ansible_facts['user_dir'] }}/ES-DE/custom_systems/es_systems.xml"
        state: link
        force: yes