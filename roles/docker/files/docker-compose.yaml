services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config
      - ${MEDIA_PATH}:/media  
    ports:
      - 8096:8096
    restart: unless-stopped
    
  navidrome:
    image: deluan/navidrome:latest
    user: ${APP_USER_ID}:${APP_GROUP_ID}
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      - ND_DEVARTISTINFOTIMETOLIVE=1s
      - ND_DEVALBUMINFOTIMETOLIVE=1s
      - ND_AGENTS=artist-nfo-metadata,lastfm,deezer,listenbrainz
      - ND_PLUGINS_AUTORELOAD=true
      - ND_PLUGINS_LOGLEVEL=debug
      - ND_BACKUP_PATH=./data/plugins
      - ND_BACKUP_SCHEDULE=0 */2 * * *
      - ND_BACKUP_COUNT=3
    volumes:
      - "${CONFIG_PATH}/navidrome:/data"
      - "${MEDIA_PATH}/music:/music:ro"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
      - ${MEDIA_PATH}:/media/  
    ports:
      - 9696:9696
    restart: unless-stopped
    
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${MEDIA_PATH}:/media  
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/media  
    ports:
      - 8989:8989
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    user: "${APP_USER_ID}:${APP_GROUP_ID}"
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055
    ports:
      - 5055:5055
    volumes:
      - ${CONFIG_PATH}/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    user: "${APP_USER_ID}:${APP_GROUP_ID}"
    restart: unless-stopped
    ports:
      - "7476:7476"
    volumes:
      - ${CONFIG_PATH}/qui:/config
      - ${MEDIA_PATH}:/media  

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    ports:
      - 6868:6868
    volumes:
      - ${CONFIG_PATH}/profilarr:/config
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    ports:
      - '8888:8080'
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  glance:
    container_name: glance
    image: glanceapp/glance
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/glance:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8094:8080

  faved:
    container_name: faved
    image: denho/faved
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/faved:/var/www/html/storage/
    ports:
      - 8063:80
      - 8443:443

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vault.example.com"  # Your domain here!
      # ADMIN_TOKEN: changeme
    volumes:
      - ${CONFIG_PATH}/vaultwarden:/data
    ports:
      - 8090:80