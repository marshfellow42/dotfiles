services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 8096:8096
    restart: unless-stopped
    
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    environment:
      - ND_DEVARTISTINFOTIMETOLIVE=1s
      - ND_DEVALBUMINFOTIMETOLIVE=1s
      - ND_AGENTS=artist-nfo-metadata,lastfm,deezer,listenbrainz
      - ND_PLUGINS_AUTORELOAD=true
      - ND_PLUGINS_LOGLEVEL=debug
      - ND_BACKUP_PATH=/data/plugins
      - ND_BACKUP_SCHEDULE=0 */2 * * *
      - ND_BACKUP_COUNT=3
    volumes:
      - "${CONFIG_PATH}/navidrome:/data"
      - "${MEDIA_PATH}/music:/music:ro"
    ports:
      - "4533:4533"
    restart: unless-stopped
    # To restore a backup, just give yourself permission in the folder
    # sudo chown -R 1000:1000 ${CONFIG_PATH}/navidrome
    # Copy and paste the .db backup in the folder and rename it to navidrome.db

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    ports:
      - 8888:8080
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  glance:
    container_name: glance
    image: glanceapp/glance
    restart: unless-stopped
    volumes:
      - ${CONFIG_PATH}/glance:/app/config
      - ${CONFIG_PATH}/glance/assets:/app/assets
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ${CONFIG_PATH}/glance/.env
    ports:
      - 8094:8080
      # sudo chown -R 1000:1000 ${CONFIG_PATH}/glance

  faved:
    container_name: faved
    image: denho/faved
    working_dir: /var/www/html
    user: "1000:1000"
    volumes:
      - ${CONFIG_PATH}/faved:/var/www/html/storage/
    ports:
      - 8063:80
      - 8443:443
    restart: unless-stopped
    # sudo chown -R 1000:1000 ${CONFIG_PATH}/faved
    # chmod -R 755 ${CONFIG_PATH}/faved

  paperless-broker:
    image: docker.io/library/redis:8
    container_name: paperless-redis
    volumes:
      - ${CONFIG_PATH}/redis/paperless:/data
    restart: unless-stopped

  paperless-db:
    image: docker.io/library/postgres:18
    container_name: paperless-postgres
    volumes:
      - ${CONFIG_PATH}/postgres/paperless:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    restart: unless-stopped

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    volumes:
      - ${CONFIG_PATH}/paperless/data:/usr/src/paperless/data
      - ${CONFIG_PATH}/paperless/media:/usr/src/paperless/media
      - ${CONFIG_PATH}/paperless/export:/usr/src/paperless/export
      - ${CONFIG_PATH}/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBHOST: paperless-db
    ports:
      - 8000:8000
    depends_on:
      - paperless-db
      - paperless-broker
    restart: unless-stopped

  bentopdf:
    image: ghcr.io/alam00000/bentopdf-simple:latest
    container_name: bentopdf
    ports:
      - 3000:8080
    restart: unless-stopped

  forgejo-db:
    image: postgres:14
    container_name: forgejo-postgres
    volumes:
      - ${CONFIG_PATH}/postgres/forgejo:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=forgejo
      - POSTGRES_PASSWORD=forgejo
      - POSTGRES_DB=forgejo
    networks:
      - forgejo
    restart: always

  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    environment:
      - USER_UID=${APP_USER_ID}
      - USER_GID=${APP_GROUP_ID}
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo-db:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo
      - FORGEJO__database__PASSWD=forgejo
    volumes:
      - ${CONFIG_PATH}/forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3069:3000'
      - '222:22'
    depends_on:
      - forgejo-db
    networks:
      - forgejo
    restart: always

  copyparty:
    image: copyparty/ac:latest
    container_name: copyparty
    user: "1000:1000"
    ports:
      - 3923:3923
    volumes:
      - ${CONFIG_PATH}/copyparty/config:/cfg:z
      - ${CONFIG_PATH}/copyparty/share:/w:z
      - /home/leandro/Imagens:/home/leandro/Imagens:ro
    # sudo chown -R 1000:1000 ${CONFIG_PATH}/copyparty

    environment:
      LD_PRELOAD: /usr/lib/libmimalloc-secure.so.2
      # enable mimalloc by replacing "NOPE" with "2" for a nice speed-boost (will use twice as much ram)

      PYTHONUNBUFFERED: 1
      # ensures log-messages are not delayed (but can reduce speed a tiny bit)

    stop_grace_period: 15s  # thumbnailer is allowed to continue finishing up for 10s after the shutdown signal
    healthcheck:
      # hide it from logs with "/._" so it matches the default --lf-url filter 
      test: ["CMD-SHELL", "wget --spider -q 127.0.0.1:3923/?reset=/._"]
      interval: 1m
      timeout: 2s
      retries: 5
      start_period: 15s

  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/kavita:/config
      - ${MEDIA_PATH}/books:/data #optional
      - /home/leandro/Projetos:/home/leandro/Projetos:ro
    ports:
      - 5000:5000
    restart: unless-stopped

networks:
  forgejo:
    external: false

