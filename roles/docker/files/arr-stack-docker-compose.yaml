services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${MEDIA_PATH}:/media
      - ${DATA_PATH}:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/media
      - ${DATA_PATH}:/data
    ports:
      - 8989:8989
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055
    ports:
      - 5055:5055
    volumes:
      - ${CONFIG_PATH}/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    # sudo chown -R 1000:1000 ${CONFIG_PATH}/seerr

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
      - ${MEDIA_PATH}:/media
      - ${DATA_PATH}:/data
    ports:
      - 9696:9696
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${APP_USER_ID}
      - PGID=${APP_GROUP_ID}
      - TZ=${TZ}
      - WEBUI_PORT=8690
    volumes:
      - ${CONFIG_PATH}/qbittorrent:/config
      - ${DATA_PATH}:/data
    ports:
      - 8690:8690
    restart: unless-stopped
    # sudo chown -R 1000:1000 ${DATA_PATH}

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    ports:
      - 7476:7476
    volumes:
      - ${CONFIG_PATH}/qui:/config
      - ${DATA_PATH}:/data

  profilarr:
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    ports:
      - 6868:6868
    volumes:
      - ${CONFIG_PATH}/profilarr:/config
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  seadexerr:
    image: ghcr.io/ryder-c/seadexerr:latest
    container_name: seadexerr
    environment:
      - SONARR_BASE_URL=http://sonarr:8989/
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_BASE_URL=http://radarr:7878/
      - RADARR_API_KEY=${RADARR_API_KEY}