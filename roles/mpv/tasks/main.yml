---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Distribution specific tasks + mpv setup"
  when: distribution_config.stat.exists
  block:

    - name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
      ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"

    - name: "mpv | {{ ansible_facts['distribution'] }} | Ensure config directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.config/mpv"
        state: directory
        mode: "0755"

    - name: "mpv | {{ ansible_facts['distribution'] }} | Symlink mpv.conf (overwrites existing)"
      ansible.builtin.file:
        src: "{{ _files_path }}/mpv.conf"
        dest: "{{ ansible_facts['user_dir'] }}/.config/mpv/mpv.conf"
        state: link
        force: yes

    - name: "mpv | {{ ansible_facts['distribution'] }} | Symlink input.conf (optional but common)"
      ansible.builtin.file:
        src: "{{ _files_path }}/input.conf"
        dest: "{{ ansible_facts['user_dir'] }}/.config/mpv/input.conf"
        state: link
        force: yes
      ignore_errors: true