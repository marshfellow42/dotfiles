---
- name: "{{ role_name }} | Install mpd"
  kewlfft.aur.aur:
    name:
      - mpd
    state: present
  become: true
  become_user: aur_builder

- name: "{{ role_name }} | Install rmpc"
  kewlfft.aur.aur:
    name:
      - rmpc
    state: present
  become: true
  become_user: aur_builder

- name: "{{ role_name }} | Install cava"
  kewlfft.aur.aur:
    name:
      - cava
    state: present
  become: true
  become_user: aur_builder