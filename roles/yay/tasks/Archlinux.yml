---
- name: "{{ role_name }} | Check if yay is installed"
  ansible.builtin.command: command -v yay
  register: yay_check
  changed_when: false
  failed_when: false

- name: "{{ role_name }} | Install dependencies for yay"
  kewlfft.aur.aur:
    name:
      - git
      - base-devel
    state: present
  become: true
  become_user: aur_builder
  when: yay_check.rc != 0

- name: "{{ role_name }} | Clone yay AUR repo"
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: "{{ ansible_facts['user_dir'] }}/yay"
  when: yay_check.rc != 0
  become: false

- name: "{{ role_name }} | Build and install yay"
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: "{{ ansible_facts['user_dir'] }}/yay"
  when: yay_check.rc != 0
  become: false

- name: "{{ role_name }} | Generate yay development package database"
  ansible.builtin.command: yay -Y --gendb
  when: yay_check.rc != 0
  become: false

- name: "{{ role_name }} | Enable permanent devel package updates"
  ansible.builtin.command: yay -Y --devel --save
  when: yay_check.rc != 0
  become: false

- name: "{{ role_name }} | Remove yay build directory"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/yay"
    state: absent
  when: yay_check.rc != 0

- name: "{{ role_name }} | Install essential apps using yay"
  kewlfft.aur.aur:
    name:
      - librewolf-bin
      - rofi-wayland
      - swww
      - mpv
      - qbittorrent
    state: present
  become: true
  become_user: aur_builder

