---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Distribution specific tasks + {{ role_name }} setup"
  when: distribution_config.stat.exists
  block:

    - name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
      ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"

    - name: "{{ role_name }} | Ensure the user has a zsh shell"
      user:
        name: "{{ ansible_facts['user_id'] }}"
        shell: /bin/zsh
        state: present
      become: true

    - name: "{{ role_name }} | Symlink zsh config folder"
      ansible.builtin.file:
        src: "{{ _files_path }}/zsh"
        dest: "{{ ansible_facts['user_dir'] }}/.config/zsh"
        state: link

    - name: "{{ role_name }} | Symlink zsh config file"
      ansible.builtin.file:
        src: "{{ _files_path }}/.zshrc"
        dest: "{{ ansible_facts['user_dir'] }}/.zshrc"
        state: link