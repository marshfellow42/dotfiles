---
- name: Create the `aur_builder` user
  become: true
  ansible.builtin.user:
    name: aur_builder
    create_home: yes
    group: wheel

- name: Allow the `aur_builder` user to run `sudo pacman` without a password
  become: true
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/11-install-aur_builder
    line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
    create: yes
    mode: 0644
    validate: 'visudo -cf %s'

- name: "{{ role_name }} | Install rate-mirrors"
  ansible.builtin.package:
    name: rate-mirrors
    state: present
  become: true

- name: "{{ role_name }} | Schedule an update of pacman mirrors every week using rate-mirrors"
  ansible.builtin.cron:
    name: "arch mirrors weekly update"
    special_time: "weekly"
    job: "rate-mirrors arch --entry-country BR --protocol https | sudo tee /etc/pacman.d/mirrorlist"
    state: present