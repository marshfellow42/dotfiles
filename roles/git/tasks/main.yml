---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config


- name: "{{ role_name }} | Distribution specific tasks + Git setup"
  when: distribution_config.stat.exists
  block:

    - name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
      ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"

    ############################################################
    # Git configuration
    ############################################################

    - name: "Git | Configure credential.helper"
      community.general.git_config:
        name: credential.helper
        scope: global
        value: store

    ############################################################
    # User
    ############################################################

    - name: "Git | Set user.name"
      community.general.git_config:
        name: user.name
        scope: global
        value: "{{ git_user_name }}"

    - name: "Git | Set user.email"
      community.general.git_config:
        name: user.email
        scope: global
        value: "{{ git_user_email }}"
      when: git_user_email is defined
      no_log: true

    - name: "Git | Set user.signingkey"
      community.general.git_config:
        name: user.signingkey
        scope: global
        value: "{{ ansible_facts['user_dir'] }}/.ssh/id_ed25519.pub"

    ############################################################
    # Commit / Tag signing
    ############################################################

    - name: "Git | Enable commit.gpgsign"
      community.general.git_config:
        name: commit.gpgsign
        scope: global
        value: true

    - name: "Git | Enable tag.gpgsign"
      community.general.git_config:
        name: tag.gpgsign
        scope: global
        value: true

    ############################################################
    # GPG (Linux version)
    ############################################################

    - name: "Git | Set gpg.program"
      community.general.git_config:
        name: gpg.program
        scope: global
        value: gpg

    ############################################################
    # Core
    ############################################################

    - name: "Git | Set core.editor"
      community.general.git_config:
        name: core.editor
        scope: global
        value: nano

    - name: "Git | Set core.autocrlf"
      community.general.git_config:
        name: core.autocrlf
        scope: global
        value: input

    ############################################################
    # Push
    ############################################################

    - name: "Git | Set push.autoSetupRemote"
      community.general.git_config:
        name: push.autoSetupRemote
        scope: global
        value: true

    ############################################################
    # Git LFS
    ############################################################

    - name: "Git | Configure filter.lfs.clean"
      community.general.git_config:
        name: filter.lfs.clean
        scope: global
        value: "git-lfs clean -- %f"

    - name: "Git | Configure filter.lfs.smudge"
      community.general.git_config:
        name: filter.lfs.smudge
        scope: global
        value: "git-lfs smudge -- %f"

    - name: "Git | Configure filter.lfs.process"
      community.general.git_config:
        name: filter.lfs.process
        scope: global
        value: "git-lfs filter-process"

    - name: "Git | Configure filter.lfs.required"
      community.general.git_config:
        name: filter.lfs.required
        scope: global
        value: true