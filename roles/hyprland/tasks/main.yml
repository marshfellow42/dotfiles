---
- name: "{{ role_name }} | Detect desktop environment"
  ansible.builtin.command: printenv XDG_CURRENT_DESKTOP
  register: desktop_env
  changed_when: false
  failed_when: false

- name: "{{ role_name }} | Normalize desktop environment"
  ansible.builtin.set_fact:
    current_desktop: "{{ desktop_env.stdout.split(':')[0] | lower }}"

- name: "{{ role_name }} | Hyprland specific tasks"
  when: current_desktop == "hyprland"
  block:

    - name: "{{ role_name }} | Symlink hypr folder"
      ansible.builtin.file:
        src: "{{ _files_path }}/hypr"
        dest: "{{ ansible_facts['user_dir'] }}/.config/hypr"
        state: link
        force: yes
