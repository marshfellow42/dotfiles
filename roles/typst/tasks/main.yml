---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Distribution specific tasks + Typst setup"
  when: distribution_config.stat.exists
  block:

    - name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
      ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"

    - name: "{{ role_name }} | Check if VSCodium is installed"
      ansible.builtin.command: command -v codium
      register: codium_installed
      changed_when: false
      failed_when: false

    - name: "{{ role_name }} | Typst VSCodium setup"
      when: codium_installed.rc == 0
      block:

        - name: Typst | {{ ansible_facts['distribution'] }} | Get installed VSCodium extensions
          ansible.builtin.command: codium --list-extensions
          register: typst_codium_extensions
          changed_when: false

        - name: Typst | {{ ansible_facts['distribution'] }} | Install Typst VSCodium extensions
          ansible.builtin.command: codium --install-extension {{ item }}
          loop:
            - mathematic.vscode-pdf
            - myriad-dreamin.tinymist
          when: item not in typst_codium_extensions.stdout_lines