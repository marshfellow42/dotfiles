---
- name: "{{ role_name }} | Install qemu packages"
  ansible.builtin.package:
    name:
      - qemu-full
      - qemu-img
      - libvirt
      - virt-install
      - virt-manager
      - virt-viewer
      - edk2-ovmf
      - dnsmasq
      - swtpm
      - guestfs-tools
      - libosinfo
      - tuned
    state: present
  become: true

- name: "{{ role_name }} | Install virtio-win"
  kewlfft.aur.aur:
    name:
      - virtio-win
    state: present
  become: true
  become_user: aur_builder

- name: "{{ role_name }} | Configure Virtualization Services and Sockets"
  hosts: all
  become: true
  vars:
    virt_drivers:
      - qemu
      - interface
      - network
      - nodedev
      - nwfilter
      - secret
      - storage

  tasks:
    - name: "{{ role_name }} | Enable virtualization services"
      ansible.builtin.systemctl:
        name: "virt{{ item }}d.service"
        enabled: true
      loop: "{{ virt_drivers }}"

    - name: "{{ role_name }} | Enable virtualization sockets (-ro and -admin)"
      ansible.builtin.systemctl:
        name: "virt{{ item[0] }}d{{ item[1] }}.socket"
        enabled: true
      with_nested:
        - "{{ virt_drivers }}"
        - ['', '-ro', '-admin']

- name: "{{ role_name }} | Enable Nested Virtualization based on CPU Vendor"
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: "{{ role_name }} | Configure nested virtualization for Intel"
      ansible.builtin.copy:
        dest: /etc/modprobe.d/kvm-intel.conf
        content: "options kvm_intel nested=1\n"
        owner: root
        group: root
        mode: '0644'
      when: "'GenuineIntel' in ansible_processor or 'Intel' in ansible_processor_view"

    - name: "{{ role_name }} | Configure nested virtualization for AMD"
      ansible.builtin.copy:
        dest: /etc/modprobe.d/kvm-amd.conf
        content: "options kvm_amd nested=1\n"
        owner: root
        group: root
        mode: '0644'
      when: "'AuthenticAMD' in ansible_processor or 'AMD' in ansible_processor_view"

- name: "{{ role_name }} | Manage Tuned Profile"
  hosts: all
  become: true

  tasks:
    - name: "{{ role_name }} | Enable Tuned"
      ansible.builtin.systemctl:
        name: "tuned.service"
        enabled: true

    - name: "{{ role_name }} | Check the active tuned profile"
      ansible.builtin.command: tuned-adm active
      register: tuned_status
      changed_when: false

    - name: "{{ role_name }} | Set profile to virtual-host if it is not already active"
      ansible.builtin.command: tuned-adm profile virtual-host
      when: "'Current active profile: virtual-host' not in tuned_status.stdout"

    - name: "{{ role_name }} | Verify the tuned profile configuration"
      ansible.builtin.command: tuned-adm verify
      register: tuned_verify
      failed_when: "'Current active profile matches' not in tuned_verify.stdout and tuned_verify.rc != 0"
      changed_when: false