---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Distribution specific tasks + Aria2 setup"
  when: distribution_config.stat.exists
  block:

    - name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
      ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"

    - name: "{{ role_name }} | Ensure .aria2 directory exists"
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.aria2"
        state: directory
        mode: "0755"

    - name: "{{ role_name }} | Ensure aria2.conf is symlinked (overwriting existing)"
      ansible.builtin.file:
        src: "{{ _files_path }}/aria2.conf"
        dest: "{{ ansible_facts['user_dir'] }}/.aria2/aria2.conf"
        state: link
        force: yes