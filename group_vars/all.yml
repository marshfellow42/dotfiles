default_roles:
  - system
  - yay
  - flatpak
  - git
  - waybar
  - zsh
  - gimp
  - fonts
  - vscodium
  - typst
  - yt-dlp
  - gallery-dl
  - fightcade
  - fastfetch
  - es-de
  - aria2

git_user_name: "marshfellow42"

k8s:
  repo:
    version: "v1.34"

helm:
  repos:
    - name: traefik
      url: https://helm.traefik.io/traefik

go:
  packages:
    - package: github.com/go-task/task/v3/cmd/task@latest
      cmd: task
    - package: github.com/joshmedeski/sesh/v2@latest
      cmd: sesh
    # LSP servers for OpenCode
    - package: golang.org/x/tools/gopls@latest
      cmd: gopls
    - package: github.com/mrjosh/helm-ls@latest
      cmd: helm-ls
    # NOTE: termshark has dependency issues with v2.4.0
    # - package: github.com/stillmatic/chat@latest
    #   cmd: chat